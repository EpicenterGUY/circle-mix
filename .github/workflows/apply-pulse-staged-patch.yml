name: Apply staged PULSE patch

on:
  push:
    branches: [feat/pulse-note-v1]
    paths:
      - .pulse-stage/READY

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pulse-note-v1
          fetch-depth: 0
      - name: Assemble and apply patch
        run: |
          cat .pulse-stage/chunk-* > /tmp/pulse.patch
          git apply --check /tmp/pulse.patch
          git apply --whitespace=nowarn /tmp/pulse.patch
          rm -rf .pulse-stage
      - name: Commit integrated PULSE implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: integrate PULSE note v1"
          git push origin HEAD:feat/pulse-note-v1
