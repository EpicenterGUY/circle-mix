name: Apply PULSE next-aim guide

on:
  push:
    branches:
      - feat/pulse-next-aim-guide
    paths:
      - scripts/apply-pulse-aim-guide.js
      - .github/workflows/apply-pulse-aim-guide.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pulse-next-aim-guide
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply focused transform
        run: node scripts/apply-pulse-aim-guide.js
      - name: Validate syntax and smoke coverage
        run: |
          node --check src/game.js
          node tests/smoke.test.js
      - name: Commit generated feature changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game.js tests/smoke.test.js
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "feat: guide aim after PULSE notes"
          git push origin HEAD:feat/pulse-next-aim-guide
