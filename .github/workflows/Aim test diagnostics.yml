name: Aim test diagnostics

on:
  push:
    branches:
      - feat/auto-aim-visual-flow
    paths:
      - scripts/update-aim-visual-regression.js
      - .github/workflows/Aim test diagnostics.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/auto-aim-visual-flow
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Update aim visual regression
        run: node scripts/update-aim-visual-regression.js
      - run: npm ci
      - name: Capture test output
        shell: bash
        run: |
          set +e
          npm test > aim-test-diagnostics.full.txt 2>&1
          status=$?
          tail -n 160 aim-test-diagnostics.full.txt > aim-test-diagnostics.txt
          echo "exit_code=$status" >> aim-test-diagnostics.txt
          rm aim-test-diagnostics.full.txt
          exit 0
      - name: Commit regression and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/smoke.test.js aim-test-diagnostics.txt
          if git diff --cached --quiet; then
            echo "No diagnostic changes"
          else
            git commit -m "test: update aim visual regression"
            git push
          fi
