name: Apply mobile SLIDE TRACE judgement v1

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/apply-mobile-slide-trace-judgement-v1.js'
      - '.github/workflows/apply-mobile-slide-trace-judgement-v1.yml'

permissions:
  contents: write

concurrency:
  group: mobile-slide-trace-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply mobile judgement patch
        run: node scripts/apply-mobile-slide-trace-judgement-v1.js
      - name: Run syntax and smoke tests
        run: npm test
      - name: Install Chromium
        run: npx playwright install chromium
      - name: Run browser regression
        run: npm run test:browser
      - name: Commit validated patch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: keep mobile ACTION hold active for SLIDE"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
