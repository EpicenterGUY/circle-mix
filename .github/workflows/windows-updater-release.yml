name: Windows updater release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer already committed in src-tauri/tauri.conf.json
        required: true
        type: string
      notes:
        description: Release notes shown inside CIRCLE MIX
        required: false
        default: Windows desktop update
        type: string
      draft:
        description: Create a draft release first
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - src-tauri/tauri.conf.json
      - .github/workflows/windows-updater-release.yml

permissions:
  contents: write
  issues: write

concurrency:
  group: windows-updater-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      RELEASE_EVENT: ${{ github.event_name }}
      INPUT_VERSION: ${{ github.event.inputs.version }}
      INPUT_NOTES: ${{ github.event.inputs.notes }}
      INPUT_DRAFT: ${{ github.event.inputs.draft }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate release secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'TAURI_SIGNING_PRIVATE_KEY GitHub Actions secret is missing.'
          }
      - name: Resolve release metadata
        shell: pwsh
        run: |
          $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $committedVersion = [string]$config.version
          if ([string]::IsNullOrWhiteSpace($committedVersion)) {
            throw 'The committed Tauri version is empty.'
          }

          if ($env:RELEASE_EVENT -eq 'workflow_dispatch') {
            if ($committedVersion -ne $env:INPUT_VERSION) {
              throw "Workflow version $env:INPUT_VERSION does not match committed version $committedVersion."
            }
            $releaseNotes = if ([string]::IsNullOrWhiteSpace($env:INPUT_NOTES)) { 'Windows desktop update' } else { $env:INPUT_NOTES }
            $releaseDraft = if ($env:INPUT_DRAFT -eq 'true') { 'true' } else { 'false' }
          } else {
            $releaseNotes = "CIRCLE MIX $committedVersion Windows update"
            $releaseDraft = 'false'
          }

          "RELEASE_VERSION=$committedVersion" >> $env:GITHUB_ENV
          "RELEASE_DRAFT=$releaseDraft" >> $env:GITHUB_ENV
          'RELEASE_NOTES<<CIRCLE_MIX_NOTES' >> $env:GITHUB_ENV
          $releaseNotes >> $env:GITHUB_ENV
          'CIRCLE_MIX_NOTES' >> $env:GITHUB_ENV
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.10.1" --locked
      - name: Install dependencies
        run: npm ci
      - name: Verify desktop distribution
        run: |
          npm run desktop:prepare
          npm run desktop:audit
          npm test
      - name: Build signed NSIS updater
        run: cargo tauri build --config src-tauri/tauri.release.conf.json
      - name: Assemble release assets
        id: assets
        shell: pwsh
        run: |
          $setup = Get-ChildItem src-tauri/target/release/bundle/nsis -Filter '*-setup.exe' | Select-Object -First 1
          if (-not $setup) { throw 'NSIS setup executable was not generated.' }
          $sigPath = "$($setup.FullName).sig"
          if (-not (Test-Path $sigPath)) { throw 'Signed updater .sig file was not generated.' }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $assetName = "circle-mix-$env:RELEASE_VERSION-windows-x64-setup.exe"
          $assetPath = Join-Path release-assets $assetName
          Copy-Item $setup.FullName $assetPath
          Copy-Item $sigPath "$assetPath.sig"
          $signature = (Get-Content $sigPath -Raw).Trim()
          $tag = "v$env:RELEASE_VERSION"
          $downloadUrl = "https://github.com/EpicenterGUY/circle-mix/releases/download/$tag/$assetName"
          $latest = [ordered]@{
            version = $env:RELEASE_VERSION
            notes = $env:RELEASE_NOTES
            pub_date = (Get-Date).ToUniversalTime().ToString('o')
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = $signature
                url = $downloadUrl
              }
            }
          }
          $latest | ConvertTo-Json -Depth 5 | Set-Content release-assets/latest.json -Encoding utf8NoBOM
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "asset=$assetPath" >> $env:GITHUB_OUTPUT
      - name: Create or update GitHub release
        shell: pwsh
        run: |
          $tag = '${{ steps.assets.outputs.tag }}'
          $asset = '${{ steps.assets.outputs.asset }}'
          & gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            & gh release upload $tag $asset "$asset.sig" 'release-assets/latest.json' --clobber
            if ($LASTEXITCODE -ne 0) { throw 'Unable to replace existing release assets.' }
            & gh release edit $tag --title "CIRCLE MIX $env:RELEASE_VERSION" --notes $env:RELEASE_NOTES "--draft=$env:RELEASE_DRAFT" --latest
            if ($LASTEXITCODE -ne 0) { throw 'Unable to update the existing GitHub release.' }
          } else {
            $args = @('release','create',$tag,$asset,"$asset.sig",'release-assets/latest.json','--title',"CIRCLE MIX $env:RELEASE_VERSION",'--notes',$env:RELEASE_NOTES)
            if ($env:RELEASE_DRAFT -eq 'true') { $args += '--draft' }
            & gh @args
            if ($LASTEXITCODE -ne 0) { throw 'Unable to create the GitHub release.' }
          }
      - name: Clear matching release failure report
        if: ${{ success() }}
        shell: pwsh
        run: |
          $title = "Windows updater release failed: v$env:RELEASE_VERSION"
          $issue = gh issue list --state open --search "in:title $title" --json number,title | ConvertFrom-Json | Where-Object { $_.title -eq $title } | Select-Object -First 1
          if ($issue) { gh issue close $issue.number --reason completed --comment "The signed updater release completed successfully on run $env:GITHUB_RUN_ID." }
      - name: Report release failure
        if: ${{ failure() }}
        shell: pwsh
        run: |
          $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $version = [string]$config.version
          $title = "Windows updater release failed: v$version"
          $runUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $body = "The signed Windows updater release failed. Run: $runUrl`n`nNo private signing material is included in this report."
          $issue = gh issue list --state open --search "in:title $title" --json number,title | ConvertFrom-Json | Where-Object { $_.title -eq $title } | Select-Object -First 1
          if ($issue) {
            gh issue edit $issue.number --body $body
          } else {
            gh issue create --title $title --body $body
          }
