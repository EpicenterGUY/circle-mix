name: Apply final PULSE fixes

on:
  push:
    branches: [feat/pulse-note-v1]
    paths:
      - .pulse-final-fixes-ready

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pulse-note-v1
          fetch-depth: 0
      - name: Apply verified final fixes
        run: |
          git apply --check .pulse-final-fixes.patch
          git apply .pulse-final-fixes.patch
          rm -f .pulse-final-fixes.patch .pulse-final-fixes-ready .github/workflows/apply-pulse-final-fixes.yml
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: finalize PULSE input and AUTO behavior"
          git push origin HEAD:feat/pulse-note-v1
