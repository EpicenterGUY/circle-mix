name: Temporary source snapshot

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source snapshot
        run: tar --exclude=.git --exclude=node_modules --exclude=desktop-dist -czf /tmp/source-snapshot.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-source-snapshot
          path: /tmp/source-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1
