name: Apply SLIDE TRACE judgement v1

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/apply-slide-trace-judgement-v1.js'
      - 'scripts/fix-slide-trace-test-assertions.js'
      - '.github/workflows/apply-slide-trace-judgement-v1.yml'

permissions:
  contents: write

concurrency:
  group: slide-trace-judgement-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply judgement patch
        id: patch
        shell: bash
        run: |
          set +e
          node scripts/fix-slide-trace-test-assertions.js > /tmp/patch-result.txt 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            node scripts/apply-slide-trace-judgement-v1.js >> /tmp/patch-result.txt 2>&1
            status=$?
          fi
          set -e
          cat /tmp/patch-result.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then cp /tmp/patch-result.txt patch-result.txt; fi
      - name: Run syntax and smoke tests
        id: tests
        if: steps.patch.outputs.status == '0'
        shell: bash
        run: |
          set +e
          npm test > /tmp/test-result.txt 2>&1
          status=$?
          set -e
          cat /tmp/test-result.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then cp /tmp/test-result.txt test-result.txt; fi
      - name: Commit diagnostics
        if: steps.patch.outputs.status != '0' || steps.tests.outputs.status != '0'
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "ci: capture slide trace patch failure"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Stop after failure
        if: steps.patch.outputs.status != '0' || steps.tests.outputs.status != '0'
        run: exit 1
      - name: Commit applied patch
        if: steps.patch.outputs.status == '0' && steps.tests.outputs.status == '0'
        shell: bash
        run: |
          rm -f patch-result.txt test-result.txt scripts/fix-slide-trace-test-assertions.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: tune SLIDE and TRACE judgement v1"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
