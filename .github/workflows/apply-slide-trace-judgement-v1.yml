name: Apply SLIDE TRACE judgement v1

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/apply-slide-trace-judgement-v1.js'
      - '.github/workflows/apply-slide-trace-judgement-v1.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply judgement patch
        run: node scripts/apply-slide-trace-judgement-v1.js
      - name: Run syntax and smoke tests
        run: npm test
      - name: Commit applied patch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/game.js tests/smoke.test.js docs/slide-trace-judgement-v1.md scripts/apply-slide-trace-judgement-v1.js .github/workflows/apply-slide-trace-judgement-v1.yml
          git commit -m "feat: tune SLIDE and TRACE judgement v1"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
