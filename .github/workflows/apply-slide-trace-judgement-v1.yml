name: Apply SLIDE TRACE judgement v1

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/apply-slide-trace-judgement-v1.js'
      - '.github/workflows/apply-slide-trace-judgement-v1.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply judgement patch
        id: patch
        shell: bash
        run: |
          set +e
          node scripts/apply-slide-trace-judgement-v1.js > patch-result.txt 2>&1
          status=$?
          set -e
          cat patch-result.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - name: Commit patch diagnostics
        if: steps.patch.outputs.status != '0'
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add patch-result.txt
          git commit -m "ci: capture slide trace patch failure"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Stop after patch failure
        if: steps.patch.outputs.status != '0'
        run: exit 1
      - name: Run syntax and smoke tests
        if: steps.patch.outputs.status == '0'
        run: npm test
      - name: Commit applied patch
        if: steps.patch.outputs.status == '0'
        shell: bash
        run: |
          rm -f patch-result.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/game.js tests/smoke.test.js docs/slide-trace-judgement-v1.md scripts/apply-slide-trace-judgement-v1.js .github/workflows/apply-slide-trace-judgement-v1.yml patch-result.txt
          git commit -m "feat: tune SLIDE and TRACE judgement v1"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
