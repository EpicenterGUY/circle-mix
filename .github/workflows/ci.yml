name: CI Safety Net

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Syntax, smoke, repository, and release metadata checks
        run: npm test && git diff --check && node scripts/check-release-metadata.js

  browser-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser regression tests
        run: npm run test:browser
        env:
          BROWSER_ARTIFACTS_DIR: artifacts/browser-regression
      - name: Upload browser failure diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-regression-diagnostics-${{ github.run_attempt }}
          path: artifacts/browser-regression
          if-no-files-found: warn
          retention-days: 14

  fold-landscape-patch:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/fold-landscape-v1'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply and validate fold landscape patch
        id: fold_patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python scripts/agent-fold-patch.py
            node --check src/game.js
            node --check tests/mobile-song-select-layout.test.js
            npm test
          } 2>&1 | tee fold-patch.log
      - name: Upload fold patch diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: fold-landscape-patch-log
          path: fold-patch.log
          retention-days: 1
      - name: Commit clean implementation
        if: ${{ steps.fold_patch.outcome == 'success' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git rm .github/workflows/agent-fold-patch.yml .github/workflows/agent-fold-inspect.yml scripts/agent-fold-patch.py
          git add src/game.js src/version.js style.css tests/smoke.test.js tests/mobile-song-select-layout.test.js .github/workflows/ci.yml
          git commit -m "fix: adapt mobile landscape to unfolded foldables"
          git push origin HEAD:${{ github.head_ref }}
      - name: Fail failed patch
        if: ${{ steps.fold_patch.outcome != 'success' }}
        run: exit 1
