name: CI Safety Net

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Syntax, smoke, repository, and release metadata checks
        run: npm test && git diff --check && node scripts/check-release-metadata.js

  browser-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser regression tests
        run: npm run test:browser
        env:
          BROWSER_ARTIFACTS_DIR: artifacts/browser-regression
      - name: Upload browser failure diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-regression-diagnostics-${{ github.run_attempt }}
          path: artifacts/browser-regression
          if-no-files-found: warn
          retention-days: 14

  apply-pulse-tutorial-browser-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'feat/pulse-tutorial-v1'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pulse-tutorial-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply position-independent browser assertions
        run: python3 .github/scripts/apply-pulse-tutorial-browser-fix.py
      - name: Check patch and syntax
        run: git diff --check && node --check tests/browser-regression.test.js
      - name: Install dependencies
        run: npm ci
      - name: Verify Node suite
        run: npm test
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify main browser regression
        run: node tests/browser-regression.test.js
      - name: Commit verified browser fix and restore CI
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/ci.yml
          rm .github/scripts/apply-pulse-tutorial-browser-fix.py
          rm .github/workflows/diagnose-pulse-tutorial.yml
          rm .github/workflows/apply-pulse-tutorial-browser-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/browser-regression.test.js .github/workflows/ci.yml .github/scripts/apply-pulse-tutorial-browser-fix.py .github/workflows/diagnose-pulse-tutorial.yml .github/workflows/apply-pulse-tutorial-browser-fix.yml
          git commit -m "test: make final tutorial browser checks position-independent"
          git push origin HEAD:feat/pulse-tutorial-v1
