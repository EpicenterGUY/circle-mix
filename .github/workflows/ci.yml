name: CI Safety Net

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Syntax, smoke, repository, and release metadata checks
        run: npm test && git diff --check && node scripts/check-release-metadata.js

  browser-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser regression tests
        run: npm run test:browser
        env:
          BROWSER_ARTIFACTS_DIR: artifacts/browser-regression
      - name: Upload browser failure diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-regression-diagnostics-${{ github.run_attempt }}
          path: artifacts/browser-regression
          if-no-files-found: warn
          retention-days: 14
