name: Agent PWA Browser Patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Update browser cache invariant
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("tests/browser-regression.test.js")
          text = path.read_text()

          replacements = [
              (
                  "      version: window.CircleMixVersion?.version,\n      changelogVersion:",
                  "      version: window.CircleMixVersion?.version,\n      cacheRevision: window.CircleMixVersion?.cacheRevision,\n      changelogVersion:"
              ),
              (
                  "    assert.equal(releaseMetadata.changelogVersion, releaseMetadata.version, `latest changelog ${JSON.stringify(releaseMetadata)}`);",
                  "    assert.ok(releaseMetadata.cacheRevision, `CircleMixVersion cache revision ${JSON.stringify(releaseMetadata)}`);\n    assert.equal(releaseMetadata.changelogVersion, releaseMetadata.version, `latest changelog ${JSON.stringify(releaseMetadata)}`);"
              ),
              (
                  "    assert.ok(releaseMetadata.cacheNames.includes(`circle-mix-v${releaseMetadata.version}-app`), `PWA app cache version ${JSON.stringify(releaseMetadata)}`);",
                  "    assert.ok(releaseMetadata.cacheNames.includes(`circle-mix-v${releaseMetadata.version}-${releaseMetadata.cacheRevision}-app`), `PWA app cache version ${JSON.stringify(releaseMetadata)}`);"
              )
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one replacement, found {count}: {old!r}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          node --check tests/browser-regression.test.js
      - name: Commit patch and remove helper workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent-pwa-browser-patch.yml
          git add tests/browser-regression.test.js
          git commit -m "test: derive browser PWA cache expectation"
          git push origin HEAD:${{ github.head_ref }}
