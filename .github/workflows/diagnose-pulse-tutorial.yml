name: Apply PULSE tutorial smoke fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/pulse-tutorial-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pulse-tutorial-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply position-independent TRACE test fix
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .github/patches/pulse-tutorial-smoke.patch
          git apply .github/patches/pulse-tutorial-smoke.patch
          git diff --check
      - run: npm ci
      - name: Verify full test suite
        run: npm test
      - name: Commit final smoke fix
        shell: bash
        run: |
          set -euo pipefail
          rm .github/patches/pulse-tutorial-smoke.patch
          rm .github/workflows/diagnose-pulse-tutorial.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/smoke.test.js .github/patches/pulse-tutorial-smoke.patch .github/workflows/diagnose-pulse-tutorial.yml
          git commit -m "test: make tutorial TRACE checks position-independent"
          git push origin HEAD:feat/pulse-tutorial-v1
