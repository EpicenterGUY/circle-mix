name: Diagnose PULSE tutorial tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feat/pulse-tutorial-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture npm test output
        shell: bash
        run: |
          set +e
          npm test > npm-test.log 2>&1
          status=$?
          cat npm-test.log
          echo "$status" > npm-test.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-tutorial-test-log
          path: |
            npm-test.log
            npm-test.status
          if-no-files-found: error
          retention-days: 1
