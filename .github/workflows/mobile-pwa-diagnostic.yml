name: Finalize mobile PWA diagnostic repair

on:
  push:
    branches:
      - feat/mobile-pwa-stability

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mobile-pwa-stability
      - name: Update stale web version expectations and remove diagnostic workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('tests/smoke.test.js')
          text=p.read_text(encoding='utf-8')
          old='''assert.match(version, /version:\\s*"0\\.9\\.30"/);\nassert.match(version, /cacheRevision:/);\nassert.match(pwa, /const RELEASE=window\\.CircleMixVersion/);\nassert.match(sw, /^importScripts\\("\\.\\/src\\/version\\.js"\\);/);\nassert.doesNotMatch(pwa, /const VERSION="0\\.9\\.30"/);\nassert.doesNotMatch(sw, /const VERSION = "0\\.9\\.30"/);\nassert.match(changelog, /version:\\s*"0\\.9\\.30"/);'''
          new='''assert.match(version, /version:\\s*"0\\.9\\.31"/);\nassert.match(version, /cacheRevision:/);\nassert.match(pwa, /const RELEASE=window\\.CircleMixVersion/);\nassert.match(sw, /^importScripts\\("\\.\\/src\\/version\\.js"\\);/);\nassert.doesNotMatch(pwa, /const VERSION="0\\.9\\.31"/);\nassert.doesNotMatch(sw, /const VERSION = "0\\.9\\.31"/);\nassert.match(changelog, /version:\\s*"0\\.9\\.31"/);'''
          if old not in text:
              raise SystemExit('stale 0.9.30 smoke expectation block not found')
          p.write_text(text.replace(old,new),encoding='utf-8')
          PY
          rm .github/workflows/mobile-pwa-diagnostic.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/smoke.test.js .github/workflows/mobile-pwa-diagnostic.yml
          git commit -m "test: expect web PWA version 0.9.31"
          git push origin HEAD:feat/mobile-pwa-stability
