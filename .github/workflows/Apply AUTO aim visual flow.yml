name: Apply aim visual flow

on:
  push:
    branches:
      - feat/auto-aim-visual-flow
    paths:
      - scripts/apply-auto-aim-visual-flow.js
      - scripts/apply-mouse-aim-feel.js
      - scripts/patch-mouse-aim-transform.js
      - scripts/finalize-aim-smoke-tests.js
      - .github/workflows/Apply AUTO aim visual flow.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-auto-aim-visual-flow.js
      - scripts/apply-mouse-aim-feel.js
      - scripts/patch-mouse-aim-transform.js
      - scripts/finalize-aim-smoke-tests.js
      - .github/workflows/Apply AUTO aim visual flow.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Repair mouse transform
        run: node scripts/patch-mouse-aim-transform.js
      - name: Apply AUTO visual flow
        run: node scripts/apply-auto-aim-visual-flow.js
      - name: Apply mouse aim feel
        run: node scripts/apply-mouse-aim-feel.js
      - name: Finalize aim smoke tests
        run: node scripts/finalize-aim-smoke-tests.js
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game.js tests/smoke.test.js
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "feat: smooth AUTO and mouse aim movement"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
      - name: Install dependencies
        run: npm ci
      - name: Run repository tests
        run: npm test
