name: Agent Fold Inspect

on:
  push:
    branches: [agent/fold-landscape-v1]

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture orientation and viewport flow
        shell: bash
        run: |
          {
            echo '=== src/game.js ==='
            grep -n -C 10 -E 'orientation|requestFullscreen|fullscreen|rotateOverlay|isMobileViewport|visualViewport|orientationchange' src/game.js || true
            echo '=== index.html ==='
            grep -n -C 6 -E 'rotateOverlay|fullscreen|orientation' index.html || true
            echo '=== style.css ==='
            grep -n -C 6 -E 'rotateOverlay|orientation|landscape|portrait|safe-area' style.css || true
            echo '=== manifest ==='
            cat manifest.webmanifest
          } > fold-inspect.txt
      - uses: actions/upload-artifact@v4
        with:
          name: fold-orientation-inspect
          path: fold-inspect.txt
          retention-days: 1
