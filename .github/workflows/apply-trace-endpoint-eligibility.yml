name: Apply TRACE endpoint eligibility

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/apply-trace-endpoint-eligibility.js'
      - '.github/workflows/apply-trace-endpoint-eligibility.yml'

permissions:
  contents: write

concurrency:
  group: trace-endpoint-eligibility-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply endpoint eligibility patch
        run: node scripts/apply-trace-endpoint-eligibility.js
      - name: Run syntax and smoke tests
        run: npm test
      - name: Commit validated patch
        shell: bash
        run: |
          rm -f scripts/apply-trace-endpoint-eligibility.js .github/workflows/apply-trace-endpoint-eligibility.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: gate TRACE endpoint capture by completed travel"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
