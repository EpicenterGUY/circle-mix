name: Export PULSE tutorial source

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-tutorial-source
          path: |
            src/game.js
            tests/pulse-game-input.test.js
          if-no-files-found: error
          retention-days: 1
