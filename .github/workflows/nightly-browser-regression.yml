name: Nightly Browser Regression

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  browser-regression-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser regression three times
        run: |
          for attempt in 1 2 3; do
            echo "Browser regression attempt ${attempt}/3"
            BROWSER_ARTIFACTS_DIR="artifacts/browser-regression/attempt-${attempt}" npm run test:browser
          done
      - name: Upload browser failure diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-browser-regression-diagnostics-${{ github.run_attempt }}
          path: artifacts/browser-regression
          if-no-files-found: warn
          retention-days: 14
