name: Apply 0.9.39 PULSE guide release

on:
  push:
    branches:
      - release/0.9.39-pulse-multi-guide
    paths:
      - scripts/apply-0.9.39-pulse-guide.js
      - scripts/patch-0.9.39-transform.js
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-0.9.39-pulse-guide.js
      - scripts/patch-0.9.39-transform.js

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Repair release transform
        run: node scripts/patch-0.9.39-transform.js
      - name: Apply release transform
        run: node scripts/apply-0.9.39-pulse-guide.js
      - name: Install dependencies
        run: npm ci
      - name: Run repository tests
        run: npm test
      - name: Commit generated release changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/apply-0.9.39-pulse-guide.js src/game.js tests/smoke.test.js package.json package-lock.json src-tauri/Cargo.toml src-tauri/tauri.conf.json scripts/prepare-desktop.js scripts/audit-desktop-dist.js tests/desktop-installer.test.js tests/desktop-updater.test.js
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "release: prepare 0.9.39 pulse multi-guide"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
