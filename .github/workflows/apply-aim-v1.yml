name: Apply aim input v1
on:
  push:
    branches: [feat/aim-input-v1]
    paths:
      - 'aim-v1.patch.gz.b64'
      - '.github/workflows/apply-aim-v1.yml'
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/aim-input-v1
          fetch-depth: 0
      - name: Apply validated patch
        shell: bash
        run: |
          base64 -d aim-v1.patch.gz.b64 | gzip -d > /tmp/aim-v1.patch
          git apply --check -p1 /tmp/aim-v1.patch
          git apply -p1 /tmp/aim-v1.patch
          rm aim-v1.patch.gz.b64
          rm .github/workflows/apply-aim-v1.yml
          rm .github/workflows/aim-source-snapshot.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'feat: rebuild PC aim input v1'
          git push origin HEAD:feat/aim-input-v1
